name: Docker Image to Docker Hub

on:
  push:
    branches:
      - QA
      - main

jobs:
  checking-push:
    name: Printing event tags
    runs-on: ubuntu-latest
    steps:
      - name: Fetching the latest push tag
        uses: actions/checkout@v3

      - name: Printing tags
        run: echo "${{ toJson(github.event.pusher) }}"

      - name: Checking any changes in requirements.txt
        if: github.ref == 'refs/heads/main'
        id: requirements-changes
        uses: tj-actions/changed-files@v35
        with:
          files: requirements.txt

      - name: Run steps if any changes made in backend
        if: steps.requirements-changes.outputs.any_changed == 'true'
        run: echo "One or more requirements in the backend have changed."

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: kishorsenthil/docker_projects

      - name: Check-image
        id: image_exists
        uses: cloudposse/github-action-docker-image-exists@main
        with:
            registry: registry.hub.docker.com
            organization: "kishorsenthil"
            repository: "docker_projects"
            login: "${{ secrets.DOCKERHUB_USERNAME }}"
            password: "${{ secrets.DOCKERHUB_PASSWORD }}"
            tag: main

      - name: Build and push Docker image
        if: ${{steps.requirements-changes.outputs.any_changed == 'true' || steps.image_exists.outputs.image_exists == '0' }}
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
#{{ steps.frontend-package-change.outputs.any_changed == 'true' || steps.check-frontend-ecr-image.outputs.image_exists == '0' }}