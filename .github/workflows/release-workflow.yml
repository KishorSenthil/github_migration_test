name: Deploy Workflow

on:
  push:
    branches:
      - main

permissions:
  actions: read  # Explicitly set permissions for actions to read
  contents: read  # Read-only access to repository contents

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository with full history for SHA verification
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Step 2: Find the last successful release workflow run
      - name: Find matching workflow
        id: sha_old
        uses: SamhammerAG/last-successful-build-action@v4
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          branch: "main"
          workflow: "release-workflow"
          verify: true  # Verifies the SHA against the repository

      # Step 3: Check if a previous successful SHA was found
      - name: Determine SHA
        id: determine_sha
        run: |
          if [ "${{ steps.sha_old.outputs.sha }}" == "" ]; then
            echo "No previous successful build found. Using current commit."
            echo "sha=${GITHUB_SHA}" >> $GITHUB_ENV
          else
            echo "Last successful build SHA found: ${{ steps.sha_old.outputs.sha }}"
            echo "sha=${{ steps.sha_old.outputs.sha }}" >> $GITHUB_ENV
          fi

      # Step 4: Print the determined SHA (for debugging purposes)
      - name: Print determined SHA
        run: |
          echo "::add-mask::${{ env.sha }}"
          echo "Determined SHA: ${{ env.sha }}"

      # Step 5: Compare current commit with the last successful build (optional)
      - name: Compare changes
        run: git diff ${{ env.sha }} HEAD

      # Step 6: Deploy the determined SHA
      - name: Deploy determined SHA
        run: |
          git checkout ${{ env.sha }}
          # Your deployment script/commands here
          ./deploy.sh
