name: Deploy Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Step 2: Get the SHA of the last successful build
      - name: Get last successful build SHA
        id: sha_old
        uses: SamhammerAG/last-successful-build-action@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          workflow: "release-workflow"
          branch: ""  # Uses the default branch

      # Step 3: Print the last successful build SHA (for debugging purposes)
      - name: Print last successful build SHA
        run: |
          echo "Last successful build SHA: ${{ steps.sha_old.outputs.sha }}"

      # Step 4: Compare current commit with the last successful build (optional)
      - name: Compare changes
        run: git diff ${{ steps.sha_old.outputs.sha }} HEAD

      # Step 5: Deploy the last successful build (example command)
      - name: Deploy last successful build
        run: |
          git checkout ${{ steps.sha_old.outputs.sha }}
          # Your deployment script/commands here
          ./deploy.sh
