<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 min-h-screen flex flex-col items-center">
    <div class="w-full max-w-4xl">
        
        <!-- Header -->
        <div class="flex justify-between items-end mb-6 border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Release Dashboard</h1>
                <p class="text-gray-500 text-sm mt-1" id="last-updated">Last Updated: Loading...</p>
            </div>
            
            <!-- Secure Action Trigger Button -->
            <a id="action-btn" href="https://github.com/YOUR_USERNAME/release-dashboard-poc/actions" target="_blank" 
               class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded shadow transition-colors">
               🚀 Trigger New Release
            </a>
        </div>

        <!-- Controls (Dropdowns) -->
        <div class="flex gap-4 mb-8 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <div class="flex-1">
                <label for="env-select" class="block text-sm font-medium text-gray-700 mb-1">Environment</label>
                <select id="env-select" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 uppercase">
                    <!-- Options injected by JS -->
                </select>
            </div>
            <div class="flex-1">
                <label for="market-select" class="block text-sm font-medium text-gray-700 mb-1">Market</label>
                <select id="market-select" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 capitalize">
                    <!-- Options injected by JS -->
                </select>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboard-content" class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
            <!-- Data injected here by JavaScript -->
        </div>

    </div>

    <script>
        // UPDATE THIS to your actual repository URL
        const repoBaseUrl = "https://github.com/YOUR_USERNAME/release-dashboard-poc"; 
        
        let manifestData = null;
        const envSelect = document.getElementById('env-select');
        const marketSelect = document.getElementById('market-select');
        const dashboardContent = document.getElementById('dashboard-content');

        // Fetch data
        fetch('./manifest.json')
            .then(response => response.json())
            .then(data => {
                manifestData = data;
                
                // Set last updated time
                const dateOptions = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                document.getElementById('last-updated').innerText = `Last Updated: ${new Date(data.last_updated).toLocaleString(undefined, dateOptions)}`;
                
                // Populate Environments dropdown
                Object.keys(data.environments).forEach(env => {
                    const option = document.createElement('option');
                    option.value = env;
                    option.textContent = env;
                    envSelect.appendChild(option);
                });

                updateMarketDropdown();
                renderDashboard();
            })
            .catch(error => console.error('Error loading manifest:', error));

        // Event Listeners for Dropdowns
        envSelect.addEventListener('change', () => {
            updateMarketDropdown();
            renderDashboard();
        });
        
        marketSelect.addEventListener('change', renderDashboard);

        // Helper: Update Markets based on selected Environment
        function updateMarketDropdown() {
            marketSelect.innerHTML = ''; // Clear current
            const selectedEnv = envSelect.value;
            const markets = Object.keys(manifestData.environments[selectedEnv]);
            
            markets.forEach(market => {
                const option = document.createElement('option');
                option.value = market;
                option.textContent = market.replace('market_', ''); // Clean up name
                marketSelect.appendChild(option);
            });
        }

        // Helper: Render the selected data
        function renderDashboard() {
            const env = envSelect.value;
            const market = marketSelect.value;
            const details = manifestData.environments[env][market];

            if (!details) {
                dashboardContent.innerHTML = `<p class="text-gray-500">No data found for this selection.</p>`;
                return;
            }

            const latest = details.latest;
            const latestImg = latest.image || "No image deployed yet";
            const latestVer = latest.version ? `<a href="${repoBaseUrl}/releases/tag/${latest.version}" target="_blank" class="text-blue-600 hover:underline font-bold">${latest.version}</a>` : "N/A";
            
            // Generate previous releases list
            const previousListHTML = details.previous.length > 0 
                ? details.previous.map(p => `
                    <li class="py-1">
                        <a href="${repoBaseUrl}/releases/tag/${p.version}" target="_blank" class="text-blue-600 hover:underline mr-2">${p.version}</a> 
                        <code class="bg-gray-50 px-2 py-0.5 rounded border border-gray-200 text-xs">${p.image}</code>
                    </li>`).join('') 
                : "<li class="text-gray-500">No previous releases</li>";

            // Inject HTML
            dashboardContent.innerHTML = `
                <h2 class="text-2xl font-bold mb-4 uppercase text-gray-800">${env} - ${market.replace('market_', '')}</h2>
                
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Current Live Release</h3>
                    <div class="mt-2 p-4 bg-blue-50 rounded border border-blue-100">
                        <p class="text-lg">Version: ${latestVer}</p>
                        <p class="text-sm text-gray-700 mt-2"><strong>Image:</strong> <code class="bg-white px-2 py-1 rounded border break-all shadow-sm">${latestImg}</code></p>
                        ${latest.deployed_at ? `<p class="text-xs text-gray-500 mt-2">Deployed: ${new Date(latest.deployed_at).toLocaleDateString()}</p>` : ''}
                    </div>
                </div>
                
                <div>
                    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">Previous Releases</h3>
                    <ul class="list-disc ml-5 mt-2 space-y-1 text-sm">
                        ${previousListHTML}
                    </ul>
                </div>
            `;
        }
    </script>
</body>
</html>
