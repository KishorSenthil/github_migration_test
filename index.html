<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 min-h-screen flex flex-col items-center font-sans">
    <div class="w-full max-w-4xl">
        
        <!-- Header -->
        <div class="flex justify-between items-end mb-6 border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Release Dashboard</h1>
                <p class="text-gray-500 text-sm mt-1" id="last-updated">Last Updated: Loading...</p>
            </div>
            
            <!-- Redirects directly to GitHub's Create Release page -->
            <a href="https://github.com/kishorsenthil/github_migration_test/releases/new" target="_blank" 
               class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg shadow transition-colors inline-flex items-center gap-2">
               ➕ Create New Release
            </a>
        </div>

        <!-- Dropdowns -->
        <div class="flex gap-4 mb-8 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <div class="flex-1">
                <label for="env-select" class="block text-sm font-medium text-gray-700 mb-1">Environment</label>
                <select id="env-select" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 uppercase">
                    <!-- Injected by JS -->
                </select>
            </div>
            <div class="flex-1">
                <label for="market-select" class="block text-sm font-medium text-gray-700 mb-1">Market</label>
                <select id="market-select" class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500 capitalize">
                    <!-- Injected by JS -->
                </select>
            </div>
        </div>

        <!-- Dashboard Display Card -->
        <div id="dashboard-content" class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
            <!-- Injected by JS -->
        </div>

    </div>

    <script>
        const repoBaseUrl = "https://github.com/kishorsenthil/github_migration_test"; 

        // Embedded Fallback Data
        const fallbackData = {
            "last_updated": new Date().toISOString(),
            "environments": {
                "dev": {
                    "market_us": { "latest": { "version": "v1.2.0", "image": "ghcr.io/app/us:v1.2.0", "deployed_at": "2026-07-21" }, "previous": [{ "version": "v1.1.9", "image": "ghcr.io/app/us:v1.1.9" }] },
                    "market_eu": { "latest": { "version": "v1.2.0", "image": "ghcr.io/app/eu:v1.2.0", "deployed_at": "2026-07-21" }, "previous": [] },
                    "market_apac": { "latest": { "version": "v1.0.5", "image": "ghcr.io/app/apac:v1.0.5", "deployed_at": "2026-07-18" }, "previous": [] }
                },
                "ppd": {
                    "market_us": { "latest": { "version": "v1.1.0", "image": "ghcr.io/app/us:v1.1.0", "deployed_at": "2026-07-10" }, "previous": [] },
                    "market_eu": { "latest": { "version": "v1.1.0", "image": "ghcr.io/app/eu:v1.1.0", "deployed_at": "2026-07-10" }, "previous": [] },
                    "market_apac": { "latest": { "version": "v0.9.5", "image": "ghcr.io/app/apac:v0.9.5", "deployed_at": "2026-07-01" }, "previous": [] }
                }
            }
        };

        let manifestData = fallbackData;
        const envSelect = document.getElementById('env-select');
        const marketSelect = document.getElementById('market-select');
        const dashboardContent = document.getElementById('dashboard-content');

        // Fetch manifest or use fallback
        fetch('./manifest.json')
            .then(response => response.ok ? response.json() : Promise.reject())
            .then(data => { manifestData = data; init(); })
            .catch(() => { init(); });

        function init() {
            const dt = new Date(manifestData.last_updated);
            document.getElementById('last-updated').innerText = `Last Updated: ${dt.toLocaleDateString()} ${dt.toLocaleTimeString()}`;
            
            // Populate Environments
            envSelect.innerHTML = '';
            Object.keys(manifestData.environments).forEach(env => {
                const opt = document.createElement('option');
                opt.value = env;
                opt.textContent = env;
                envSelect.appendChild(opt);
            });

            updateMarketDropdown();
            renderDashboard();
        }

        envSelect.addEventListener('change', () => {
            updateMarketDropdown();
            renderDashboard();
        });
        
        marketSelect.addEventListener('change', renderDashboard);

        function updateMarketDropdown() {
            marketSelect.innerHTML = '';
            const selectedEnv = envSelect.value;
            const markets = Object.keys(manifestData.environments[selectedEnv] || {});
            
            markets.forEach(market => {
                const opt = document.createElement('option');
                opt.value = market;
                opt.textContent = market.replace('market_', '');
                marketSelect.appendChild(opt);
            });
        }

        function renderDashboard() {
            const env = envSelect.value;
            const market = marketSelect.value;
            
            if (!env || !market || !manifestData.environments[env] || !manifestData.environments[env][market]) {
                dashboardContent.innerHTML = `<p class="text-gray-500">No release data found for this selection.</p>`;
                return;
            }

            const details = manifestData.environments[env][market];
            const latest = details.latest || {};
            const latestImg = latest.image || "No image deployed yet";
            const latestVer = latest.version ? `<a href="${repoBaseUrl}/releases/tag/${latest.version}" target="_blank" class="text-blue-600 hover:underline font-bold">${latest.version} ↗</a>` : "N/A";
            
            const previousListHTML = details.previous && details.previous.length > 0 
                ? details.previous.map(p => `
                    <li class="py-1 flex justify-between items-center text-sm">
                        <a href="${repoBaseUrl}/releases/tag/${p.version}" target="_blank" class="text-blue-600 hover:underline font-medium">${p.version}</a> 
                        <code class="bg-gray-50 px-2 py-0.5 rounded border border-gray-200 text-xs font-mono">${p.image}</code>
                    </li>`).join('') 
                : `<li class="text-gray-400 text-sm italic">No previous releases</li>`;

            dashboardContent.innerHTML = `
                <h2 class="text-2xl font-bold mb-4 uppercase text-gray-800">${env} - ${market.replace('market_', '')}</h2>
                
                <div class="mb-6">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Current Live Release</h3>
                    <div class="mt-2 p-4 bg-blue-50 rounded-lg border border-blue-100">
                        <p class="text-lg">Version: ${latestVer}</p>
                        <p class="text-sm text-gray-700 mt-2"><strong>Image:</strong> <code class="bg-white px-2 py-1 rounded border break-all shadow-sm font-mono text-xs">${latestImg}</code></p>
                        ${latest.deployed_at ? `<p class="text-xs text-gray-500 mt-2">Deployed: ${latest.deployed_at}</p>` : ''}
                    </div>
                </div>
                
                <div>
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Previous Releases</h3>
                    <ul class="divide-y divide-gray-100">
                        ${previousListHTML}
                    </ul>
                </div>
            `;
        }
    </script>
</body>
</html>
