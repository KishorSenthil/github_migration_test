<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Release Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1" id="last-updated">Last Updated: Loading...</p>
            </div>
            <a href="https://github.com/kishorsenthil/github_migration_test/actions" target="_blank" 
               class="inline-flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-lg shadow-sm transition">
               🚀 Trigger New Release
            </a>
        </div>

        <!-- Environment Tabs -->
        <div class="flex border-b border-gray-300 gap-2" id="env-tabs">
            <!-- Tabs injected dynamically -->
        </div>

        <!-- Cards Container (3 Markets) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="market-cards">
            <!-- Cards injected dynamically -->
        </div>

    </div>

    <script>
        const repoBaseUrl = "https://github.com/kishorsenthil/github_migration_test";

        // Fallback data in case manifest.json isn't accessible
        const fallbackData = {
            "last_updated": new Date().toISOString(),
            "environments": {
                "dev": {
                    "market_us": { "latest": { "version": "v1.2.0", "image": "ghcr.io/app/us:v1.2.0", "deployed_at": "2026-07-21" }, "previous": [{ "version": "v1.1.9", "image": "ghcr.io/app/us:v1.1.9" }] },
                    "market_eu": { "latest": { "version": "v1.2.0", "image": "ghcr.io/app/eu:v1.2.0", "deployed_at": "2026-07-21" }, "previous": [] },
                    "market_apac": { "latest": { "version": "v1.0.5", "image": "ghcr.io/app/apac:v1.0.5", "deployed_at": "2026-07-18" }, "previous": [] }
                },
                "ppd": {
                    "market_us": { "latest": { "version": "v1.1.0", "image": "ghcr.io/app/us:v1.1.0", "deployed_at": "2026-07-10" }, "previous": [] },
                    "market_eu": { "latest": { "version": "v1.1.0", "image": "ghcr.io/app/eu:v1.1.0", "deployed_at": "2026-07-10" }, "previous": [] },
                    "market_apac": { "latest": { "version": "v0.9.5", "image": "ghcr.io/app/apac:v0.9.5", "deployed_at": "2026-07-01" }, "previous": [] }
                }
            }
        };

        let activeEnv = 'dev';
        let dataStore = fallbackData;

        // Try fetching manifest, otherwise use fallback
        fetch('./manifest.json')
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(data => { dataStore = data; initDashboard(); })
            .catch(() => { console.warn("Using fallback data"); initDashboard(); });

        function initDashboard() {
            const dt = new Date(dataStore.last_updated);
            document.getElementById('last-updated').innerText = `Last Updated: ${dt.toLocaleDateString()} ${dt.toLocaleTimeString()}`;
            
            renderTabs();
            renderCards();
        }

        function renderTabs() {
            const container = document.getElementById('env-tabs');
            container.innerHTML = '';
            
            Object.keys(dataStore.environments).forEach(env => {
                const isActive = env === activeEnv;
                const btn = document.createElement('button');
                btn.className = `px-6 py-3 font-semibold text-sm rounded-t-lg transition border-b-2 uppercase ${
                    isActive 
                    ? 'bg-white text-blue-600 border-blue-600 shadow-sm' 
                    : 'text-gray-500 hover:text-gray-800 border-transparent'
                }`;
                btn.innerText = env;
                btn.onclick = () => { activeEnv = env; renderTabs(); renderCards(); };
                container.appendChild(btn);
            });
        }

        function renderCards() {
            const container = document.getElementById('market-cards');
            container.innerHTML = '';

            const markets = dataStore.environments[activeEnv] || {};

            Object.entries(markets).forEach(([mktName, info]) => {
                const latest = info.latest || {};
                const previous = info.previous || [];
                const displayName = mktName.replace('market_', '').toUpperCase();

                const prevList = previous.length > 0 
                    ? previous.map(p => `
                        <li class="flex items-center justify-between text-xs py-1">
                            <a href="${repoBaseUrl}/releases/tag/${p.version}" target="_blank" class="text-blue-600 font-medium hover:underline">${p.version}</a>
                            <span class="text-gray-400 font-mono text-[10px] truncate max-w-[150px]">${p.image}</span>
                        </li>`).join('')
                    : `<li class="text-gray-400 text-xs italic">No previous releases</li>`;

                const card = `
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-200 flex flex-col justify-between">
                        <div>
                            <div class="flex items-center justify-between mb-4 border-b pb-2">
                                <h3 class="font-bold text-lg text-gray-800 tracking-wider">${displayName}</h3>
                                <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2.5 py-0.5 rounded-full uppercase">${activeEnv}</span>
                            </div>

                            <!-- Latest Tag -->
                            <div class="mb-4">
                                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-1">Live Image</span>
                                ${latest.version ? `
                                    <div class="bg-gray-50 border border-gray-100 rounded-lg p-3">
                                        <a href="${repoBaseUrl}/releases/tag/${latest.version}" target="_blank" class="text-blue-600 font-bold text-base hover:underline block mb-1">
                                            ${latest.version} ↗
                                        </a>
                                        <code class="text-xs text-gray-600 bg-white border border-gray-200 px-2 py-1 rounded block truncate font-mono">${latest.image}</code>
                                    </div>
                                ` : '<p class="text-sm text-gray-400 italic">No deployment</p>'}
                            </div>
                        </div>

                        <!-- Previous List -->
                        <div class="mt-2 pt-3 border-t border-gray-100">
                            <details class="group cursor-pointer">
                                <summary class="text-xs font-semibold text-gray-500 hover:text-blue-600 flex items-center justify-between">
                                    <span>Previous Releases (${previous.length})</span>
                                    <span class="group-open:rotate-180 transition-transform">▾</span>
                                </summary>
                                <ul class="mt-2 divide-y divide-gray-100 space-y-1">
                                    ${prevList}
                                </ul>
                            </details>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }
    </script>
</body>
</html>
