<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Release Image Dashboard</h1>
        <p class="text-gray-600 mb-8" id="last-updated">Last Updated: Loading...</p>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Data will be injected here by JavaScript -->
        </div>
    </div>

    <script>
        fetch('./manifest.json')
            .then(response => response.json())
            .then(data => {
                const dateOptions = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                const formattedDate = new Date(data.last_updated).toLocaleString(undefined, dateOptions);
                document.getElementById('last-updated').innerText = `Last Updated: ${formattedDate}`;
                
                const dashboard = document.getElementById('dashboard');
                
                for (const [env, markets] of Object.entries(data.environments)) {
                    let envHTML = `<div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                                     <h2 class="text-2xl font-bold mb-4 uppercase text-gray-800">${env} Environment</h2>`;
                    
                    for (const [market, details] of Object.entries(markets)) {
                        const latestImg = details.latest.image || "No image deployed yet";
                        
                        envHTML += `
                            <div class="mb-6 border-b pb-4 last:border-0 last:pb-0 last:mb-0">
                                <h3 class="text-lg font-semibold uppercase text-gray-600 tracking-wide">${market.replace('market_', '')}</h3>
                                <p class="text-gray-900 mt-2"><strong>Latest:</strong> <br><code class="bg-gray-100 text-pink-600 px-2 py-1 rounded text-sm break-all">${latestImg}</code></p>
                                
                                <details class="mt-3 text-sm text-gray-500 cursor-pointer group">
                                    <summary class="hover:text-blue-600 transition-colors">View Previous Releases (${details.previous.length})</summary>
                                    <ul class="list-disc ml-5 mt-2 space-y-1">
                                        ${details.previous.length > 0 
                                            ? details.previous.map(p => `<li><code class="bg-gray-50 px-1 rounded border border-gray-200">${p.image || p.version}</code></li>`).join('') 
                                            : "<li>No previous releases</li>"}
                                    </ul>
                                </details>
                            </div>
                        `;
                    }
                    envHTML += `</div>`;
                    dashboard.innerHTML += envHTML;
                }
            })
            .catch(error => console.error('Error loading manifest:', error));
    </script>
</body>
</html>
